<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hdrGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="50%" stop-color="#7B2CFF"/>
      <stop offset="100%" stop-color="#FF00C8"/>
    </linearGradient>
    <filter id="hdrGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="900" height="220" fill="#050712"/>

  <!-- Bordure néon -->
  <rect x="10" y="10" width="880" height="200" rx="18"
        fill="none" stroke="url(#hdrGradient)" stroke-width="2" filter="url(#hdrGlow)"/>

  <!-- Scanline animée -->
  <rect x="10" y="40" width="880" height="2" fill="url(#hdrGradient)">
    <animate attributeName="y" from="40" to="190" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Titre -->
  <text x="50%" y="95" text-anchor="middle"
        fill="#E5E7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="40" letter-spacing="6">
    CORESUITE
  </text>

  <!-- Sous-titre -->
  <text x="50%" y="130" text-anchor="middle"
        fill="#8F9BFF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" letter-spacing="4">
    MODULAR INTELLIGENCE SUITE FOR DEVELOPERS
  </text>

  <!-- Tagline -->
  <text x="50%" y="165" text-anchor="middle"
        fill="#5C6FFF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" letter-spacing="3">
    MINIMAL • FAST • MODULAR • SECURE
  </text>
</svg>
